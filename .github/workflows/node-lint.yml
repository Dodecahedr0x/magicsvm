name: node-lint
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - node-magicsvm/docs/**
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          check-latest: true
      - name: Rustup install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install dependencies
        run: cd crates/node-magicsvm && corepack enable && yarn install
      - name: Lint rust
        run: cd crates/node-magicsvm && yarn lint:rust
      - name: Lint JS
        run: cd crates/node-magicsvm && yarn lint:js
